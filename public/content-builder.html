<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chommie Content Designer</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --venda-yellow: #FACC15;
            --venda-green: #22C55E;
            --color-border: #000000;
            --color-bg: #F8FAFC;
            --color-card-bg: #FFFFFF;
            --color-text: #0F172A;
            --color-text-muted: #64748B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            margin: 0;
            padding: 20px;
        }

        .brutalist-card {
            background: var(--color-card-bg);
            border: 4px solid var(--color-border);
            border-radius: 16px;
            box-shadow: 8px 8px 0px var(--color-border);
            transition: all 0.2s;
        }

        .brutalist-card--sm {
            background: var(--color-card-bg);
            border: 3px solid var(--color-border);
            border-radius: 12px;
            box-shadow: 4px 4px 0px var(--color-border);
        }

        .btn-brutalist {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 3px solid var(--color-border);
            border-radius: 8px;
            box-shadow: 4px 4px 0px var(--color-border);
            transition: 0.1s;
        }

        .btn-brutalist:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--color-border);
        }

        .btn-brutalist:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px transparent;
        }

        .btn-primary-brutalist {
            background-color: var(--venda-yellow);
            color: #000;
        }

        .fw-black { font-weight: 900; }
        .uppercase { text-transform: uppercase; }
        .ls-1 { letter-spacing: 1px; }

        /* Path Preview Styles */
        .path-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #fff;
            min-height: 400px;
        }

        .chapter-header {
            background: #000;
            color: #fff;
            padding: 15px 20px;
            border-radius: 12px;
            border: 3px solid #000;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .path-node-row {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 400px;
            gap: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .path-node-circle {
            width: 50px;
            height: 50px;
            border: 3px solid #000;
            border-radius: 50%;
            background: var(--venda-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            box-shadow: 0 4px 0 #000;
        }

        .path-node-card {
            background: #fff;
            border: 3px solid #000;
            border-radius: 10px;
            padding: 8px 15px;
            box-shadow: 4px 4px 0px #000;
            flex-grow: 1;
        }

        .path-node-line {
            position: absolute;
            left: 23px;
            top: 50px;
            bottom: -15px;
            width: 4px;
            background: #e2e8f0;
            z-index: 1;
        }

        /* Challenge Preview */
        .challenge-preview {
            background: #fff;
            padding: 30px;
            min-height: 400px;
        }

        .option-card {
            border: 3px solid #000;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.1s;
        }

        .option-card:hover {
            background: #f8fafc;
        }

        .sidebar-editor {
            height: calc(100vh - 40px);
            overflow-y: auto;
            padding-right: 15px;
        }

        .sticky-preview {
            position: sticky;
            top: 0;
        }
    </style>
</head>
<body>

<div id="root"></div>

<!-- React and Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
    const { useState, useEffect } = React;

    const ContentBuilder = () => {
        const [course, setCourse] = useState({
            title: "Intro to Venda",
            lessons: [
                {
                    id: "l1",
                    title: "Greetings",
                    questions: [
                        { id: "q1", question: "How do you say Hello?", options: ["Ndaa", "Aa", "Salani"], correctIndex: 0 },
                        { id: "q2", question: "What is 'Thank you'?", options: ["Ndaa", "Ro livhuwa", "Salani"], correctIndex: 1 }
                    ]
                }
            ]
        });

        const [activePreview, setActivePreview] = useState('path'); // 'path' or 'quiz'
        const [selectedLessonIdx, setSelectedLessonIdx] = useState(0);

        const addLesson = () => {
            const newLesson = {
                id: `l${course.lessons.length + 1}`,
                title: "New Lesson",
                questions: []
            };
            setCourse({...course, lessons: [...course.lessons, newLesson]});
        };

        const addQuestion = (lessonIdx) => {
            const newLessons = [...course.lessons];
            newLessons[lessonIdx].questions.push({
                id: `q${newLessons[lessonIdx].questions.length + 1}`,
                question: "New Question?",
                options: ["Option 1", "Option 2"],
                correctIndex: 0
            });
            setCourse({...course, lessons: newLessons});
        };

        const updateLessonTitle = (idx, title) => {
            const newLessons = [...course.lessons];
            newLessons[idx].title = title;
            setCourse({...course, lessons: newLessons});
        };

        const updateQuestion = (lIdx, qIdx, field, value) => {
            const newLessons = [...course.lessons];
            newLessons[lIdx].questions[qIdx][field] = value;
            setCourse({...course, lessons: newLessons});
        };

        const updateOption = (lIdx, qIdx, oIdx, value) => {
            const newLessons = [...course.lessons];
            newLessons[lIdx].questions[qIdx].options[oIdx] = value;
            setCourse({...course, lessons: newLessons});
        };

        const removeLesson = (idx) => {
            const newLessons = course.lessons.filter((_, i) => i !== idx);
            setCourse({...course, lessons: newLessons});
            if (selectedLessonIdx >= newLessons.length) setSelectedLessonIdx(0);
        };

        const removeQuestion = (lIdx, qIdx) => {
            const newLessons = [...course.lessons];
            newLessons[lIdx].questions = newLessons[lIdx].questions.filter((_, i) => i !== qIdx);
            setCourse({...course, lessons: newLessons});
        };

        const addOption = (lIdx, qIdx) => {
            const newLessons = [...course.lessons];
            newLessons[lIdx].questions[qIdx].options.push("New Option");
            setCourse({...course, lessons: newLessons});
        };

        const removeOption = (lIdx, qIdx, oIdx) => {
            const newLessons = [...course.lessons];
            newLessons[lIdx].questions[qIdx].options = newLessons[lIdx].questions[qIdx].options.filter((_, i) => i !== oIdx);
            setCourse({...course, lessons: newLessons});
        };

        return (
            <div className="container-fluid">
                <div className="row">
                    {/* EDITOR SIDEBAR */}
                    <div className="col-md-5 sidebar-editor">
                        <div className="d-flex justify-content-between align-items-center mb-4">
                            <h2 className="fw-black uppercase ls-1 mb-0">Content Designer</h2>
                            <button className="btn btn-brutalist btn-primary-brutalist btn-sm" onClick={() => console.log(JSON.stringify(course, null, 2))}>
                                Export JSON
                            </button>
                        </div>

                        <div className="brutalist-card p-4 mb-4">
                            <label className="fw-black smallest uppercase mb-2">Course Title</label>
                            <input 
                                className="form-control mb-3" 
                                value={course.title} 
                                onChange={(e) => setCourse({...course, title: e.target.value})}
                                style={{border: '3px solid #000', fontWeight: 'bold'}}
                            />
                            
                            <h5 className="fw-black uppercase mt-4 mb-3">Lessons</h5>
                            {course.lessons.map((lesson, lIdx) => (
                                <div key={lIdx} className="brutalist-card--sm p-3 mb-3 bg-light">
                                    <div className="d-flex gap-2 mb-2">
                                        <input 
                                            className="form-control fw-bold" 
                                            value={lesson.title} 
                                            onChange={(e) => updateLessonTitle(lIdx, e.target.value)}
                                        />
                                        <button className="btn btn-danger btn-sm" onClick={() => removeLesson(lIdx)}>✕</button>
                                    </div>

                                    <div className="mt-3">
                                        <h6 className="fw-black smallest uppercase mb-2">Questions ({lesson.questions.length})</h6>
                                        {lesson.questions.map((q, qIdx) => (
                                            <div key={qIdx} className="border-top border-dark pt-3 mt-3">
                                                <div className="d-flex gap-2 mb-2">
                                                    <textarea 
                                                        className="form-control form-control-sm" 
                                                        value={q.question} 
                                                        onChange={(e) => updateQuestion(lIdx, qIdx, 'question', e.target.value)}
                                                    />
                                                    <button className="btn btn-outline-danger btn-sm" onClick={() => removeQuestion(lIdx, qIdx)}>✕</button>
                                                </div>
                                                
                                                <div className="ps-3">
                                                    {q.options.map((opt, oIdx) => (
                                                        <div key={oIdx} className="d-flex gap-2 mb-1">
                                                            <input 
                                                                type="radio" 
                                                                name={`correct-${lIdx}-${qIdx}`} 
                                                                checked={q.correctIndex === oIdx}
                                                                onChange={() => updateQuestion(lIdx, qIdx, 'correctIndex', oIdx)}
                                                            />
                                                            <input 
                                                                className="form-control form-control-sm" 
                                                                value={opt} 
                                                                onChange={(e) => updateOption(lIdx, qIdx, oIdx, e.target.value)}
                                                            />
                                                            <button className="btn btn-sm py-0" onClick={() => removeOption(lIdx, qIdx, oIdx)}>✕</button>
                                                        </div>
                                                    ))}
                                                    <button className="btn btn-link btn-sm p-0 mt-1" onClick={() => addOption(lIdx, qIdx)}>+ Add Option</button>
                                                </div>
                                            </div>
                                        ))}
                                        <button className="btn btn-brutalist btn-sm mt-3 w-100" onClick={() => addQuestion(lIdx)}>
                                            + Add Question
                                        </button>
                                    </div>
                                </div>
                            ))}
                            <button className="btn btn-brutalist btn-primary-brutalist w-100 mt-2" onClick={addLesson}>
                                + Add Lesson
                            </button>
                        </div>
                    </div>

                    {/* PREVIEW AREA */}
                    <div className="col-md-7 sticky-preview">
                        <div className="d-flex gap-2 mb-3">
                            <button 
                                className={`btn btn-brutalist flex-fill ${activePreview === 'path' ? 'btn-primary-brutalist' : 'bg-white'}`}
                                onClick={() => setActivePreview('path')}
                            >
                                Path Preview
                            </button>
                            <button 
                                className={`btn btn-brutalist flex-fill ${activePreview === 'quiz' ? 'btn-primary-brutalist' : 'bg-white'}`}
                                onClick={() => setActivePreview('quiz')}
                            >
                                Quiz Preview
                            </button>
                        </div>

                        <div className="brutalist-card overflow-hidden">
                            {activePreview === 'path' ? (
                                <div className="path-container">
                                    <div className="chapter-header">
                                        <div>
                                            <div className="fw-black smallest uppercase opacity-50">Chapter 1</div>
                                            <h4 className="fw-black mb-0">{course.title}</h4>
                                        </div>
                                        <div className="rounded-circle border border-2 border-white d-flex align-items-center justify-content-center" style={{width: 40, height: 40}}>
                                            <span className="fw-black">0%</span>
                                        </div>
                                    </div>

                                    {course.lessons.map((lesson, idx) => (
                                        <div key={idx} className="path-node-row">
                                            {idx < course.lessons.length - 1 && <div className="path-node-line"></div>}
                                            <div className="path-node-circle">
                                                <i className="bi bi-play-fill fs-4"></i>
                                            </div>
                                            <div className="path-node-card">
                                                <div className="fw-black text-uppercase" style={{fontSize: '0.9rem'}}>{lesson.title}</div>
                                                <div className="smallest fw-bold text-muted uppercase">START MISSION</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="challenge-preview">
                                    <div className="mb-4">
                                        <label className="fw-black smallest uppercase text-muted mb-2">Lesson: {course.lessons[selectedLessonIdx]?.title}</label>
                                        <select 
                                            className="form-select form-select-sm mb-4" 
                                            value={selectedLessonIdx}
                                            onChange={(e) => setSelectedLessonIdx(parseInt(e.target.value))}
                                            style={{border: '3px solid #000'}}
                                        >
                                            {course.lessons.map((l, i) => <option key={i} value={i}>{l.title}</option>)}
                                        </select>
                                    </div>

                                    {course.lessons[selectedLessonIdx]?.questions.length > 0 ? (
                                        <div>
                                            <h3 className="fw-black mb-5 text-center px-4">
                                                {course.lessons[selectedLessonIdx].questions[0].question}
                                            </h3>
                                            <div className="options-list">
                                                {course.lessons[selectedLessonIdx].questions[0].options.map((opt, i) => (
                                                    <div key={i} className={`option-card ${course.lessons[selectedLessonIdx].questions[0].correctIndex === i ? 'border-success bg-success-subtle' : ''}`}>
                                                        <div className="d-flex justify-content-between align-items-center">
                                                            <span>{opt}</span>
                                                            {course.lessons[selectedLessonIdx].questions[0].correctIndex === i && <i className="bi bi-check-circle-fill text-success"></i>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-5">
                                                <button className="btn btn-brutalist btn-primary-brutalist w-100 py-3">CONTINUE</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="text-center py-5">
                                            <p className="text-muted">No questions in this lesson yet.</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ContentBuilder />);
</script>

</body>
</html>
